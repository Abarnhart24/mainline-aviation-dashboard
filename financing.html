<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Financing - Mainline Aviation</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0e1a;color:#e8eef5;padding:24px;}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:24px;}
.kpi{background:#131826;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:16px 20px;}
.kpi .label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:6px;}
.kpi .value{font-size:22px;font-weight:700;color:#e8eef5;margin-bottom:4px;}
.kpi .delta{font-size:12px;color:#64748b;}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#475569;margin:24px 0 12px;}
.card{background:#131826;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:20px;margin-bottom:16px;}
h3{font-size:14px;font-weight:600;color:#94a3b8;margin-bottom:16px;}
.chart-wrap{height:240px;position:relative;}
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
.filters label{font-size:12px;color:#64748b;font-weight:500;}
.filters select{background:#0f1623;border:1px solid rgba(255,255,255,0.12);border-radius:6px;color:#e8eef5;padding:5px 10px;font-size:12px;outline:none;}
.info{font-size:12px;color:#64748b;margin-left:auto;}
.tbl-wrap{border-radius:10px;border:1px solid rgba(255,255,255,0.07);overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{padding:10px 14px;font-weight:600;color:#64748b;border-bottom:1px solid rgba(255,255,255,0.08);text-align:left;background:#131826;}
thead th.r{text-align:right;}
thead th.c{text-align:center;}
.date-row td{background:rgba(255,255,255,0.025);padding:6px 14px;font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid rgba(255,255,255,0.06);}
tbody tr.data-row{border-bottom:1px solid rgba(255,255,255,0.04);}
tbody tr.data-row:hover{background:rgba(255,255,255,0.03);}
tbody td{padding:9px 14px;}
tbody td.r{text-align:right;}
tbody td.c{text-align:center;}
tbody td.dim{color:#64748b;font-size:12px;}
tfoot td{padding:10px 14px;font-weight:700;background:rgba(255,255,255,0.04);border-top:2px solid rgba(255,255,255,0.1);}
tfoot td.r{text-align:right;color:#60a5fa;}
tfoot td.c{text-align:center;color:#64748b;}
.badge{display:inline-block;font-family:monospace;background:rgba(96,165,250,0.15);color:#60a5fa;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;}
.badge.v110{background:rgba(52,211,153,0.15);color:#34d399;}
.cpm{color:#34d399;font-weight:600;}
.mc{display:inline-block;background:rgba(255,255,255,0.07);border-radius:10px;padding:1px 7px;font-size:11px;color:#94a3b8;margin-left:4px;}
</style>
</head>
<body>
<div class="kpis" id="kpis"></div>
<div class="section-title">Daily Food Cost - May 2026</div>
<div class="card">
  <h3>Total Food Cost by Flight (USD)</h3>
  <div class="chart-wrap"><canvas id="chart"></canvas></div>
</div>
<div class="section-title">Cost per Mission by Team Lead</div>
<div class="filters">
  <label>Flight:</label>
  <select id="fFlight" onchange="render()">
    <option value="">All Flights</option>
    <option value="104">V104 - ATL to LHR</option>
    <option value="110">V110 - ATL to MAN</option>
  </select>
  <label>Date:</label>
  <select id="fDate" onchange="render()"><option value="">All Dates</option></select>
  <label>Lead:</label>
  <select id="fLead" onchange="render()"><option value="">All Leads</option></select>
  <span class="info" id="info"></span>
</div>
<div class="tbl-wrap">
  <table>
    <thead>
      <tr>
        <th>Team Lead</th>
        <th>Flight</th>
        <th>Aircraft</th>
        <th class="c">Missions</th>
        <th class="r">Cost / Mission</th>
        <th class="r">Lead Total</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
    <tfoot>
      <tr>
        <td colspan="3">Total</td>
        <td class="c" id="ftotm"></td>
        <td class="r" id="favg"></td>
        <td class="r" id="ftot"></td>
      </tr>
    </tfoot>
  </table>
</div>

<script>
var foodCost = {
  "2026-05-01":{"104":8549.55,"110":6097.81},
  "2026-05-02":{"104":7696.54,"110":5747.35},
  "2026-05-03":{"104":8390.95,"110":6279.28},
  "2026-05-04":{"104":8300.94,"110":6396.47},
  "2026-05-05":{"104":7652.39,"110":6132.13},
  "2026-05-06":{"104":7356.35,"110":5658.77},
  "2026-05-07":{"104":7721.96,"110":5991.99},
  "2026-05-08":{"104":8131.25,"110":6033.51},
  "2026-05-09":{"104":8219.44,"110":6430.59},
  "2026-05-10":{"104":8233.10,"110":6047.14}
};

var raw = [
  ["2026-05-01","104","Bobbie Jackson III","350UNK",2],
  ["2026-05-01","104","Gabriel Silva Mane","350UNK",2],
  ["2026-05-01","110","Maurice Smith","330UNK",2],
  ["2026-05-01","110","Christian Lawson","330UNK",2],
  ["2026-05-02","104","Abubakarr Sessay","350UNK",2],
  ["2026-05-02","104","Christian Lawson","350UNK",2],
  ["2026-05-02","110","Bobbie Jackson III","330UNK",2],
  ["2026-05-02","110","Maurice Smith","330UNK",2],
  ["2026-05-03","104","Bobbie Jackson III","A350_2",2],
  ["2026-05-03","104","Claudette St. Juste","A350_2",2],
  ["2026-05-03","110","Gabriel Silva Mane","330UNK",2],
  ["2026-05-04","104","Claudette St. Juste","A350_2",2],
  ["2026-05-04","104","Abubakarr Sessay","A350_2",2],
  ["2026-05-04","110","Bobbie Jackson III","GVSXY",2],
  ["2026-05-04","110","Issa Camara","GVSXY",2],
  ["2026-05-05","104","Claudette St. Juste","A350_2",2],
  ["2026-05-05","104","Abubakarr Sessay","A350_2",2],
  ["2026-05-05","110","Christian Lawson","330UNK",2],
  ["2026-05-06","104","Christian Lawson","A350_2",1],
  ["2026-05-06","104","Tecari Brown","350UNK",1],
  ["2026-05-06","110","Claudette St. Juste","330UNK",1],
  ["2026-05-06","110","Abdou Diakhate","330UNK",1],
  ["2026-05-07","104","Christian Lawson","350UNK",1],
  ["2026-05-07","104","Abdou Diakhate","350UNK",1],
  ["2026-05-07","110","Bobbie Jackson III","330UNK",1],
  ["2026-05-07","110","Abdou Diakhate","330UNK",1],
  ["2026-05-08","104","Gabriel Silva Mane","350UNK",1],
  ["2026-05-08","104","Maurice Smith","350UNK",1],
  ["2026-05-08","110","Christian Lawson","GVSXY",1],
  ["2026-05-08","110","Bobbie Jackson III","GVSXY",1],
  ["2026-05-09","104","Maurice Smith","350UNK",1],
  ["2026-05-09","104","Gabriel Silva Mane","350UNK",1],
  ["2026-05-09","110","Christian Lawson","330UNK",1],
  ["2026-05-09","110","Bobbie Jackson III","330UNK",1],
  ["2026-05-10","104","Gabriel Silva Mane","350UNK",1],
  ["2026-05-10","104","Rachel Lester","350UNK",1],
  ["2026-05-10","110","Claudette St. Juste","330UNK",1],
  ["2026-05-10","110","Maurice Smith","330UNK",1]
];

function fmt(n){return "$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});}
function fd(s){return new Date(s+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}

// Total missions per date+ob
var mTotals = {};
raw.forEach(function(r){ var k=r[0]+"|"+r[1]; mTotals[k]=(mTotals[k]||0)+r[4]; });

// Enrich
var data = raw.map(function(r){
  var dayCost=(foodCost[r[0]]||{})[r[1]]||0;
  var tot=mTotals[r[0]+"|"+r[1]]||1;
  var cpm=dayCost/tot;
  return {date:r[0],ob:r[1],lead:r[2],asset:r[3],missions:r[4],cpm:cpm,leadTotal:cpm*r[4]};
});

// Filters
var allDates=[...new Set(data.map(function(r){return r.date;}))].sort();
var allLeads=[...new Set(data.map(function(r){return r.lead;}))].sort();
allDates.forEach(function(d){var o=document.createElement("option");o.value=d;o.textContent=fd(d);document.getElementById("fDate").appendChild(o);});
allLeads.forEach(function(l){var o=document.createElement("option");o.value=l;o.textContent=l;document.getElementById("fLead").appendChild(o);});

// KPIs
var gtCost=Object.keys(foodCost).reduce(function(s,d){return s+(foodCost[d]["104"]||0)+(foodCost[d]["110"]||0);},0);
var totMissions=data.reduce(function(s,r){return s+r.missions;},0);
document.getElementById("kpis").innerHTML=
  "<div class='kpi'><div class='label'>Total Food Cost</div><div class='value'>"+fmt(gtCost)+"</div><div class='delta'>May 1-10 - V104 + V110</div></div>"+
  "<div class='kpi'><div class='label'>Total Missions</div><div class='value'>"+totMissions+"</div><div class='delta'>Matched with Excel</div></div>"+
  "<div class='kpi'><div class='label'>Avg Cost / Mission</div><div class='value'>"+fmt(gtCost/totMissions)+"</div><div class='delta'>Split equally per day</div></div>"+
  "<div class='kpi'><div class='label'>Unique Leads</div><div class='value'>"+allLeads.length+"</div><div class='delta'>Across V104 + V110</div></div>";

// Chart
var cd=Object.keys(foodCost).sort();
new Chart(document.getElementById("chart"),{type:"bar",data:{labels:cd.map(function(d){return fd(d).replace(", 2026","");}),datasets:[{label:"V104 ATL-LHR",data:cd.map(function(d){return foodCost[d]["104"]||0;}),backgroundColor:"rgba(96,165,250,0.75)",borderRadius:4},{label:"V110 ATL-MAN",data:cd.map(function(d){return foodCost[d]["110"]||0;}),backgroundColor:"rgba(52,211,153,0.75)",borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#94a3b8"}},tooltip:{callbacks:{label:function(c){return c.dataset.label+": "+fmt(c.raw);}}}},scales:{x:{ticks:{color:"#64748b"},grid:{color:"rgba(255,255,255,0.05)"}},y:{ticks:{color:"#64748b",callback:function(v){return "$"+v.toLocaleString();}},grid:{color:"rgba(255,255,255,0.05)"}}}}});

function render(){
  var flt=document.getElementById("fFlight").value;
  var fdt=document.getElementById("fDate").value;
  var fld=document.getElementById("fLead").value;
  var rows=data.filter(function(r){return(!flt||r.ob===flt)&&(!fdt||r.date===fdt)&&(!fld||r.lead===fld);});

  // Group by date for section headers
  var html2="", lastDate="", totM=0, totCost=0;
  rows.forEach(function(r){
    if(r.date!==lastDate){
      if(lastDate) html2+="<tr class='date-row'><td colspan='6'></td></tr>";
      html2+="<tr class='date-row'><td colspan='6'>"+fd(r.date)+"</td></tr>";
      lastDate=r.date;
    }
    var bc=r.ob==="110"?"v110":"";
    totM+=r.missions; totCost+=r.leadTotal;
    html2+="<tr class='data-row'>";
    html2+="<td><strong>"+r.lead+"</strong></td>";
    html2+="<td><span class='badge "+bc+"'>V"+r.ob+"</span></td>";
    html2+="<td class='dim'>"+r.asset+"</td>";
    html2+="<td class='c'><span class='mc'>"+r.missions+"</span></td>";
    html2+="<td class='r'>"+fmt(r.cpm)+"</td>";
    html2+="<td class='r cpm'>"+fmt(r.leadTotal)+"</td>";
    html2+="</tr>";
  });

  document.getElementById("tbody").innerHTML=html2;
  document.getElementById("info").textContent=rows.length+" leads shown";
  document.getElementById("ftotm").textContent=totM+" missions";
  document.getElementById("favg").textContent=fmt(totCost/totM);
  document.getElementById("ftot").textContent=fmt(totCost);
}
render();
</script>
</body>
</html>
