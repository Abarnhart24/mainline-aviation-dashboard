name: Deploy Sullivan Billing to EC2

on:
  push:
    branches: [main]
    paths:
      - "sullivan-billing-app/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sullivan-billing-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --production=false

      - name: Push database schema
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npx prisma db push

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /home/ubuntu/sullivan-billing-app
            git pull origin main
            npm install --production=false
            rm -rf .next
            npm run build
            pm2 restart sullivan-billing --update-env || pm2 start npm --name "sullivan-billing" -- start
            echo "==> Done."
