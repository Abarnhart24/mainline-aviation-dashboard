name: Daily Dashboard Refresh

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      backfill_start:
        description: 'Backfill start date (YYYY-MM-DD, optional — leave blank for normal 30-day window)'
        required: false
        type: string
      backfill_end:
        description: 'Backfill end date (YYYY-MM-DD, optional — leave blank for normal 30-day window)'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests playwright
          playwright install chromium --with-deps

      - name: Fetch Springshot data & rebuild dashboard
        env:
          SPRINGSHOT_EMAIL: ${{ secrets.SPRINGSHOT_EMAIL }}
          SPRINGSHOT_PASSWORD: ${{ secrets.SPRINGSHOT_PASSWORD }}
          BACKFILL_START: ${{ github.event.inputs.backfill_start }}
          BACKFILL_END: ${{ github.event.inputs.backfill_end }}
        run: python automation/github_action_refresh.py

      - name: Commit & push refreshed dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Missions_Operations_Dashboard.html MissionsSummary_master.csv
          git diff --cached --quiet || git commit -m "Dashboard refresh — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
